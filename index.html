<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무대예술전문인 자격검정 점수 계산기</title>
<style>
:root {
  --border:#e5e7eb;
  --shadow:0 10px 24px rgba(0,0,0,.12);
  --ok:#16a34a;
  --danger:#ef4444;
}

*{box-sizing:border-box}
body{
  margin:0;
  padding:60px 20px;
  font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:#f3f4f6;
  display:flex;
  justify-content:center;
}
.wrap{width:min(420px,100%)}
.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

h1{margin:0 0 8px;font-size:20px}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:14px}

label{display:block;margin-top:12px;margin-bottom:6px;font-weight:700;color:#6b7280}
input,select{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#f9fafb;
  font-size:16px;
}
input:focus, select:focus {
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,0.18);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  color:#fff;
  background:rgba(0,0,0,0.7);
  font-weight:700;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
  margin-top:14px;
}
button:hover{background:rgba(0,0,0,0.9)}
button:disabled{background:rgba(0,0,0,0.3);cursor:not-allowed}

.result{
  display:none;
  margin-top:18px;
  padding:16px;
  border-radius:14px;
  background:rgba(0,0,0,.65);
  color:#fff;
}
.result.active{display:block}

.score{font-size:28px;font-weight:700}

.line{
  padding:4px 8px;
  border-radius:8px;
  margin-bottom:2px;
}
.line.fail{
  background:rgba(239,68,68,.2);
}

.badge{
  margin-left:6px;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  background:#fff;
}
.badge.ok{color:var(--ok)}
.badge.fail{color:var(--danger)}

.guide{
  margin-bottom:8px;
  font-size:14px;
  font-weight:700;
}

.note{
  margin-top:12px;
  padding:10px;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-size:13px;
  display: flex;
  justify-content: center;
  white-space: nowrap;
  overflow-x: auto;
}

.makeby{
  text-align:right;
  font-size:13px;
  color:#6b7280;
  margin-top:10px;
  white-space: nowrap;
}
.makeby a{
  color:#6b7280;
  text-decoration:none;
  border-bottom:1px solid #d1d5db;
  transition:color .15s ease, border-color .15s ease;
}
.makeby a:hover{
  color:#4f46e5;
  border-color:#4f46e5;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>무대예술전문인 자격검정 점수 계산기</h1>
    <p class="subtitle">
      정답 수를 입력하고 버튼을 눌러 합격 여부를 확인하세요.
    </p>

    <label>등급</label>
    <select id="grade">
      <option value="1">1급</option>
      <option value="2">2급</option>
      <option value="3">3급</option>
    </select>

    <label>공통과목 정답 수 (0~50)</label>
    <input type="number" id="common" min="0" max="50" value="0">

    <label>전공과목 정답 수 (0~25)</label>
    <input type="number" id="major" min="0" max="25" value="0">

    <button id="calcBtn" disabled>결과 확인</button>

    <div class="result" id="resultBox">
      <p class="guide" id="guide"></p>

      <p>총점(환산): <span class="score" id="total"></span></p>

      <p id="cLine" class="line">
        공통 환산점수: <span id="cScore"></span> / <span id="cMax"></span>
        (과락 <span id="cFail"></span>)
      </p>

      <p id="mLine" class="line">
        전공 환산점수: <span id="mScore"></span> / <span id="mMax"></span>
        (과락 <span id="mFail"></span>)
      </p>

      <p>
        합격 여부: <span id="pass" class="badge">-</span>
      </p>

      <div class="note">
        ⚠️ 본 결과는 참고용이며 공식 결과와 다를 수 있습니다.
      </div>
    </div>

    <div class="makeby"><a href="https://blog.naver.com/ambiguous_ending" target="_blank">Each One</a></div>
  </div>
</div>

<script>
const gradeData = {
  1: { cRate: 0.4, mRate: 3.2, cMax: 50*0.4, mMax: 25*3.2 },
  2: { cRate: 0.6, mRate: 2.8, cMax: 50*0.6, mMax: 25*2.8 },
  3: { cRate: 0.8, mRate: 2.4, cMax: 50*0.8, mMax: 25*2.4 }
};

const $ = id => document.getElementById(id);
function round2(num){ return Math.round(num*100)/100; }

function validateInputs(){
  const c = +$('common').value;
  const m = +$('major').value;
  return !isNaN(c)&&!isNaN(m)&&c>=0&&c<=50&&m>=0&&m<=25;
}

function calc(){
  if(!validateInputs()) return;

  const cNum = +$('common').value;
  const mNum = +$('major').value;
  const g = gradeData[$('grade').value];

  const cScore = round2(cNum * g.cRate);
  const mScore = round2(mNum * g.mRate);
  const total = round2(cScore + mScore);

  $('cScore').innerText = cScore;
  $('mScore').innerText = mScore;
  $('total').innerText = total;
  $('cMax').innerText = round2(g.cMax);
  $('mMax').innerText = round2(g.mMax);

  // 과락 40% 미만
  const cFail = cScore < g.cMax * 0.4;
  const mFail = mScore < g.mMax * 0.4;

  $('cFail').innerText = round2(g.cMax * 0.4);
  $('mFail').innerText = round2(g.mMax * 0.4);

  $('cLine').className = 'line' + (cFail ? ' fail' : '');
  $('mLine').className = 'line' + (mFail ? ' fail' : '');

  const totalFail = total < 60;

  let guideMsg = '';
  if(cFail || mFail){
    guideMsg = `과락입니다.`;
  } else if(totalFail){
    guideMsg = `합격까지 ${round2(60-total)}점 부족합니다.`;
  } else {
    guideMsg = '🎉 축하합니다! 합격입니다.';
  }

  $('guide').innerText = guideMsg;

  $('pass').innerText = ( !(cFail || mFail) && !totalFail ) ? '합격' : '불합격';
  $('pass').className = 'badge ' + ( (!(cFail || mFail) && !totalFail) ? 'ok' : 'fail');

  $('resultBox').classList.add('active');
}

function checkBtn(){
  $('calcBtn').disabled = !validateInputs();
}

['common','major'].forEach(id => $(id).addEventListener('input', checkBtn));
$('grade').addEventListener('change', checkBtn);
$('calcBtn').addEventListener('click', calc);

['common','major'].forEach(id=>{
  const el=$(id);
  el.addEventListener('focus', ()=>{ if(el.value=="0") el.value=""; });
});

checkBtn();
</script>
</body>
</html>
